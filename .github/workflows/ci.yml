name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # 1a) Validate the raw definition files in inst/extdata. These tests do not
  #     import the Python package, so only a minimal dependency set is needed.
  raw-data-tests:
    name: Raw data tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies (no package)
        run: |
          poetry install --with tests-data --no-root

      - name: Run raw data tests
        run: |
          poetry run pytest tests/data -v

  # 1b) Test the functionality of the Python package (load_criteria & helpers).
  package-tests:
    name: Package tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install package and dependencies
        run: |
          poetry install --with tests-package

      - name: Run package tests
        run: |
          poetry run pytest tests/package -v

  # 2) Lint and formatting checks with ruff.
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install devtools dependencies
        run: |
          poetry install --only devtools --no-root

      - name: Ruff lint
        run: |
          poetry run ruff check ./python/ ./tests/

      - name: Ruff format check
        run: |
          poetry run ruff format --check ./python/ ./tests/

  # 3) Build the documentation (including the generated R reference).
  docs:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install package and docs dependencies
        run: |
          poetry install --with docs

      - name: Install R and IRkernel
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base libzmq3-dev
          sudo Rscript -e "install.packages(c('IRkernel', 'Rd2md'), repos='https://packagemanager.posit.co/cran/__linux__/noble/latest')"
          mkdir -p /tmp/ir_kernel
          printf '{"argv":["/usr/bin/R","--slave","-e","IRkernel::main()","--args","{connection_file}"],"display_name":"R","language":"R"}' \
            > /tmp/ir_kernel/kernel.json
          poetry run jupyter kernelspec install /tmp/ir_kernel --name ir --user

      - name: Generate R documentation
        run: |
          Rscript -e "
          library(Rd2md)
          fns <- list.files('./man/', pattern='[.]Rd$', full.names=TRUE)
          out <- file('./docs/code/R.md', 'w')
          for (f in fns) { writeLines(as_markdown(read_rdfile(f)), out); writeLines('\n\n---\n\n', out) }
          close(out)
          "

      - name: Build documentation
        env:
          LD_LIBRARY_PATH: ""
        run: |
          poetry run mkdocs build
